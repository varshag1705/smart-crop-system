<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predict Before It Strikes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">

<!-- LEAFLET MAP -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background: radial-gradient(circle at top, #052818, #000000);
    color:white;
}

.topbar{
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    background: rgba(0,0,0,0.6);
    border-bottom: 1px solid rgba(0,255,120,0.2);
}

.back-btn{
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: none;
    background: #00ff99;
    color: #000;
    font-weight: bold;
    cursor: pointer;
}

.title{
    color:#00ff99;
    font-weight:bold;
}

.container{
    max-width:900px;
    margin:20px auto;
    padding:15px;
}

.card{
    background: rgba(10,25,15,0.85);
    border: 1px solid rgba(0,255,120,0.2);
    border-radius: 16px;
    padding: 15px;
    margin-bottom: 15px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
    background:#111;
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.btn{
    background: linear-gradient(90deg,#00ff99,#00cc77);
    color:#000;
}

.mapbtn{
    background:#00cc77;
    color:#000;
}

#map{
    height:300px;
    border-radius:12px;
    margin-top:10px;
}

#result{
    display:none;
}

.forecast-grid{
    display:grid;
    gap:10px;
    margin-top:10px;
}

.fcard{
    background: rgba(0,255,120,0.06);
    border: 1px solid rgba(0,255,120,0.15);
    padding:12px;
    border-radius:14px;
}

.fcard h4{
    margin:0 0 6px 0;
    color:#00ff99;
}

.low{color:#00ff99;font-weight:bold;}
.medium{color:#ffd700;font-weight:bold;}
.high{color:#ff4d4d;font-weight:bold;}
</style>
</head>

<body>
    <div id="google_translate_element"></div>

<div class="topbar">
    <button class="back-btn" onclick="goHome()">⬅</button>
    <div class="title">Predict Before It Strikes</div>
</div>

<div class="container">

<!-- INPUT -->
<div class="card">

    <h3>🌾 Crop Selection</h3>
    <input list="crops" id="cropInput" placeholder="Type or select crop">

    <datalist id="crops">
        <option value="Tomato">
        <option value="Rice">
        <option value="Wheat">
        <option value="Cotton">
        <option value="Chilli">
        <option value="Maize">
        <option value="Banana">
        <option value="Sugarcane">
        <option value="Groundnut">
    </datalist>

    <h3>📍 Location</h3>
    <input type="text" id="location" placeholder="Select from map or type">

    <button class="mapbtn" onclick="initMap()">🗺 Open Map</button>
    <div id="map"></div>

    <button class="btn" onclick="predict()">📊 Get Forecast</button>

</div>

<!-- RESULT -->
<div id="result"></div>

</div>

<script>

function goHome(){
    window.location.href = "index.html";
}

/* MAP */
let map;
let marker;

function initMap(){

    if(map) return;

    map = L.map('map').setView([17.3850, 78.4867], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        attribution:'OpenStreetMap'
    }).addTo(map);

    map.on('click', async function(e){

        let lat = e.latlng.lat;
        let lon = e.latlng.lng;

        if(marker) map.removeLayer(marker);

        marker = L.marker([lat, lon]).addTo(map);

        let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
        let data = await res.json();

        let place =
            data.address.city ||
            data.address.town ||
            data.address.village ||
            "Selected Area";

        document.getElementById("location").value = place;

        localStorage.setItem("predLat", lat);
        localStorage.setItem("predLon", lon);
    });
}

/* PREDICTION */
function predict(){

let crop = document.getElementById("cropInput").value;
let loc = document.getElementById("location").value;

if(!crop || !loc){
    alert("Please enter crop and location");
    return;
}

let risk = 60;
let warning = "";
let recommendation = "";
let riskColor = "medium";

crop = crop.toLowerCase();

if(crop.includes("rice")){
    risk = 82;
    riskColor = "high";
    warning = "High humidity risk for Blast disease.";
    recommendation = "Improve drainage and monitor leaves.";
}
else if(crop.includes("tomato")){
    risk = 68;
    riskColor = "medium";
    warning = "Early blight risk due to humidity.";
    recommendation = "Avoid overhead irrigation.";
}
else if(crop.includes("cotton")){
    risk = 76;
    riskColor = "high";
    warning = "Pest attack likely.";
    recommendation = "Use pest traps and neem spray.";
}
else{
    warning = "Normal conditions.";
    recommendation = "Follow regular farming practices.";
}

let forecastHTML = "";

for(let i=0;i<7;i++){

    let date = new Date();
    date.setDate(date.getDate()+i);

    let riskDay = Math.min(95, risk + Math.floor(Math.random()*10)-3);

    let cls = riskDay > 70 ? "high" : riskDay > 40 ? "medium" : "low";

    forecastHTML += `
    <div class="fcard">
        <h4>${date.toDateString().slice(0,10)}</h4>
        <p>Risk: <span class="${cls}">${riskDay}%</span></p>
    </div>`;
}

document.getElementById("result").innerHTML = `
<div class="card">
<h2 style="color:#00ff99;">🌍 Prediction Report</h2>

<p><b>Crop:</b> ${crop}</p>
<p><b>Location:</b> ${loc}</p>

<p><b>Risk:</b> <span class="${riskColor}">${risk}%</span></p>
<p><b>Warning:</b> ${warning}</p>
<p><b>Recommendation:</b> ${recommendation}</p>

<h3 style="color:#00ff99;">📊 7-Day Forecast</h3>
<div class="forecast-grid">${forecastHTML}</div>
</div>
`;

document.getElementById("result").style.display = "block";

}
function googleTranslateElementInit() {
    new google.translate.TranslateElement(
        {
            pageLanguage: 'en',
            includedLanguages: 'en,te,hi,ta,kn',
            autoDisplay: false
        },
        'google_translate_element'
    );
}
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
